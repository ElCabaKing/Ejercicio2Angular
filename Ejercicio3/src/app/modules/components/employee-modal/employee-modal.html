<div class="modal-backdrop" (click)="closeModal()"></div>
<div class="modal-container">
    <div class="modal-content">
        <h2>Employee Modal</h2>
        <p>Contenido del modal para agregar empleados.</p>
        <form (ngSubmit)="saveEmployee()">
            <label for="name">Nombre:</label>
            <input id="name" name="name" type="text" [(ngModel)]="employeeData.name" />

            <label for="position">Cargo:</label>
            <input id="position" name="position" type="text" [(ngModel)]="employeeData.position" />

            <label for="email">Correo:</label>
            <input id="email" name="email" type="email" [(ngModel)]="employeeData.email" />

            <label for="phone">Telefono:</label>
            <input id="phone" name="phone" type="tel" [(ngModel)]="employeeData.phone" />

            <label for="department">Departamento:</label>
            <input id="department" name="department" type="text" [(ngModel)]="employeeData.department" />

            <label for="salary">Salario:</label>
            <input id="salary" name="salary" type="number" [(ngModel)]="employeeData.salary" />

            <button type="submit">Guardar</button>
            <button type="button" (click)="closeModal()">Cancelar</button>
        </form>
    </div>
</div>
