@if (isLoading()) {
  <app-spinner></app-spinner>
}
<div class="page-content">
  <mat-form-field class="search-field">
    <input
      matInput
      placeholder="Id de Estudiante"
      (ngModelChange)="searchStudent($event)"
      [(ngModel)]="searchTerm"
      name="searchTerm"
    >
  </mat-form-field>

  <section class="cards-grid">
    @for (student of listStudent(); track student.id) {
      <app-student-card [student]="student"></app-student-card>
    }
  </section>
</div>
