@if (isLoading()) {
  <app-spinner></app-spinner>
}
<div class="page-content">
  <div class="search-actions">
    <mat-form-field class="search-field" appearance="outline">
      <input
        matInput
        placeholder="Id de Curso"
        (ngModelChange)="searchCourse($event)"
        [(ngModel)]="searchTerm"
        name="searchTerm"
      >
    </mat-form-field>
    <button class="add-course-button" mat-raised-button color="primary" (click)="openCourseModal()">
      Agregar Curso
    </button>
  </div>

  <section class="cards-grid">
    @for (course of listCourses(); track course.id) {
      <app-course-card [course]="course" (courseUpdated)="loadCourses()"></app-course-card>
    }
  </section>
</div>
