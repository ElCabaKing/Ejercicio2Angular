<h2 mat-dialog-title>Informacion del Estudiante</h2>
<mat-dialog-content>
    <p>
        Estas seguro que deseas eliminar al estudiante {{ data.name }}? Esta acción no se puede deshacer.
    </p>
    <div mat-dialog-actions>
        <button mat-raised-button color="warn" type="button" (click)="deleteStudent()">Eliminar</button>
        <button mat-raised-button type="button" (click)="closeModal()">Cerrar</button>
    </div>
</mat-dialog-content>
