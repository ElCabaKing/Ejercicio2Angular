<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title-group>
      <mat-card-title>{{ course?.name }}</mat-card-title>
      <mat-card-subtitle>Level: {{ course?.level }}</mat-card-subtitle>
    </mat-card-title-group>
  </mat-card-header>
  <mat-card-content>
    {{ course?.description }}
  </mat-card-content>
</mat-card>
