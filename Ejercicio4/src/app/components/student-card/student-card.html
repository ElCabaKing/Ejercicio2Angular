<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title-group>
      <mat-card-title>{{ student?.name }}</mat-card-title>
      <mat-card-subtitle>curso: {{student?.courseId}}</mat-card-subtitle>
      <img mat-card-sm-image src={{student?.avatar}} >
    </mat-card-title-group>
  </mat-card-header>
  <mat-card-content>
    {{ student?.email }}
  </mat-card-content>
</mat-card>
